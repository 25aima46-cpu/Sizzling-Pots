<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sizzling Pots 🍲</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🔥 Sizzling Pots</h1>
  <p>Hot & Delicious Food Delivered Fast</p>

  <!-- 🔥 ORDER FORM -->
  <div class="card">
    <h2>Order Your Food</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="email" id="email" placeholder="Enter Email">

    <select id="item">
      <option>Chicken Biryani</option>
      <option>Meals</option>
      <option>Roti Curry</option>
      <option>Curd Rice</option>
      <option>Fried Rice</option>
      <option>Noodles</option>
    </select>

    <input type="number" id="quantity" placeholder="Quantity">

    <button onclick="placeOrder()">Order Now 🔥</button>

    <p id="msg"></p>
  </div>

  <!-- 🔥 PORTFOLIO SECTION -->
  <div class="portfolio">
    <h2>👨‍💻 My Portfolio</h2>

    <img src="yourphoto.jpg" alt="My Photo">

    <p><b>Name:</b> Sylvester Galilee</p>
    <p><b>Email:</b> 25aima46@kristujayanti.com</p>
    <p><b>Phone:</b> 9538167555</p>

  </div>

  <script src="script.js"></script>

</body>
</html>
