<!DOCTYPE html>
<html>
<head>
  <title>GreenBasket Project</title>
</head>
<body>

<h1>Welcome to GreenBasket 🛒</h1>

<h3>Student Details</h3>
<p><b>Name:</b> Sylvester Galilee</p>
<p><b>Class:</b> Your Class Name</p>
<p><b>Email:</b> your@email.com</p>

<hr>

<h2>Place Order</h2>

<form id="orderForm">
  <input type="text" id="name" placeholder="Your Name" required><br><br>
  <input type="text" id="product" placeholder="Product" required><br><br>
  <input type="number" id="quantity" placeholder="Quantity" required><br><br>

  <button type="submit">Place Order</button>
</form>

<br>

<a href="/orders">View Orders</a>

<script>
document.getElementById("orderForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    product: document.getElementById("product").value,
    quantity: document.getElementById("quantity").value
  };

  await fetch("/add-order", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("Order Placed!");
});
</script>

</body>
</html>
