<!DOCTYPE html>
<html>
<head>
  <title>Sizzling Pots</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>Welcome to Sizzling Pots 🔥</h1>
</div>

<div class="card">
  <h2>Order Your Food</h2>

  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">

  <select id="item">
    <option>Chicken Biryani</option>
    <option>Meals</option>
    <option>Roti Curry</option>
    <option>Curd Rice</option>
    <option>Fried Rice</option>
    <option>Noodles</option>
  </select>

  <input id="class" placeholder="Address / Table No">

  <button onclick="placeOrder()">Order Now 🔥</button>

  <p id="msg"></p>
</div>

<script>
function placeOrder() {
  fetch("/add-order", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      class: document.getElementById("class").value,
      item: document.getElementById("item").value
    })
  })
  .then(res => res.text())
  .then(data => {
    document.getElementById("msg").innerText = data;
  });
}
</script>

</body>
</html>
